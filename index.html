<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Profil Keren</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(270deg, #667eea, #764ba2, #ff6ec4);
        background-size: 600% 600%;
        animation: gradientMove 10s ease infinite;
        color: white;
    }

    @keyframes gradientMove {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
    }

    .card {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 30px;
        width: 330px;
        text-align: center;
        box-shadow: 0 0 25px rgba(255,255,255,0.3);
        animation: floatCard 4s ease-in-out infinite;
    }

    @keyframes floatCard {
        0%,100% {transform: translateY(0);}
        50% {transform: translateY(-10px);}
    }

    img {
        width: 150px;
        border-radius: 50%;
        border: 4px solid white;
        animation: pulse 2s infinite;
        transition: 0.4s;
    }

    img:hover {
        transform: scale(1.15) rotate(10deg);
    }

    @keyframes pulse {
        0% {box-shadow: 0 0 10px white;}
        50% {box-shadow: 0 0 30px #ff6ec4;}
        100% {box-shadow: 0 0 10px white;}
    }

    h1 {
        margin: 15px 0;
        font-size: 24px;
        text-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    p {
        margin: 5px;
        opacity: 0.9;
    }

    .social a {
        display: inline-block;
        margin: 10px 5px;
        padding: 10px 15px;
        border-radius: 30px;
        text-decoration: none;
        color: white;
        background: linear-gradient(45deg, #ff6ec4, #7873f5);
        transition: 0.3s;
        box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .social a:hover {
        transform: scale(1.1) rotate(-3deg);
        box-shadow: 0 0 20px #fff;
    }

    /* Animasi teks ketik */
    .typing {
        border-right: 3px solid white;
        white-space: nowrap;
        overflow: hidden;
        width: 0;
        animation: typing 3s steps(20) forwards, blink 0.6s infinite;
        margin: 10px auto;
    }

    @keyframes typing {
        to { width: 100%; }
    }

    @keyframes blink {
        50% { border-color: transparent; }
    }

</style>
</head>

<body>

<div class="card">
    <img src="hr.jpg" alt="Foto Profil">

    <h1 class="typing">HIROSHI RAFI</h1>

    <p>📚 Kelas: XII TJKT 2</p>
    <p>🏫 Sekolah: SMK KOMPUTAMA MAJENANG</p>
    <p>🎯 Hobi: membuat DIY</p>
    <p>🚀 Cita-cita: Menjadi orang sukses</p>

    <div class="social">
        <a href="https://www.instagram.com/hirosi_rafi?igsh=anVtbzlxOXdiMDY4">Instagram</a>
        <a href="https://www.facebook.com/profile.php?id=100073877411784">Facebook</a>
        <a href="https://vm.tiktok.com/ZS98w3nLqtw7F-k2wxq/">TikTok</a>
    </div>
</div>

</body>
</html>
